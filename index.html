<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Calendar PRO MAX</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/747/747310.png">

<style>
*{box-sizing:border-box}

body{
margin:0;
padding:16px;
background:#020617;
font-family:system-ui,Arial;
color:#fff;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:12px;
align-items:center;
}

button{
padding:6px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.reset-month{background:#facc15;color:#000}
.reset-all{background:#ef4444;color:#fff}
.export{background:#22c55e}
.import{background:#3b82f6}

.done-count{
margin-left:auto;
font-weight:700;
}

.calendar{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-auto-rows:240px;
gap:12px;
transition:.4s ease;
}

.month{
background:#0f172a;
border-radius:18px;
padding:10px;
display:flex;
flex-direction:column;
cursor:pointer;
transition:.4s cubic-bezier(.4,0,.2,1);
}

.month-title{
text-align:center;
font-weight:700;
margin-bottom:6px;
}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
font-size:11px;
opacity:.6;
margin-bottom:4px;
}

.week div{text-align:center}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
grid-template-rows:repeat(6,1fr);
gap:4px;
flex:1;
}

.day{
background:#1e293b;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
user-select:none;
position:relative;
}

.day.empty{background:transparent;cursor:default}

.day.done{background:#22c55e;color:#000}
.day.holiday{background:#ef4444}
.day.today{border:2px solid #38bdf8}

.tooltip{
position:absolute;
bottom:120%;
left:50%;
transform:translateX(-50%);
background:#000;
padding:4px 6px;
border-radius:6px;
font-size:11px;
white-space:nowrap;
display:none;
}

.day:hover .tooltip{
display:block;
}

.calendar.active .month:not(.active){
transform:scale(.75);
opacity:.5;
}

.month.active{
grid-column:span 2;
grid-row:span 2;
z-index:5;
}

@media(max-width:900px){
.calendar{grid-template-columns:repeat(2,1fr)}
.month.active{grid-column:span 2;grid-row:span 1}
}
</style>
</head>

<body>

<div class="controls">
<button class="reset-month" onclick="resetMonth()">Reset tháng</button>
<button class="reset-all" onclick="resetAll()">Reset tất cả</button>
<button class="export" onclick="exportJSON()">Export JSON</button>

<input type="file" id="importFile" hidden>
<button class="import" onclick="document.getElementById('importFile').click()">Import JSON</button>

<div class="done-count">DONE: <span id="doneCount">0</span></div>
</div>

<div class="calendar" id="calendar"></div>

<script>

const calendar=document.getElementById("calendar")
const KEY="calendar_pro_max"

const today=new Date()
const year=today.getFullYear()
const todayStr=today.toISOString().slice(0,10)

let activeMonth=null
let data=JSON.parse(localStorage.getItem(KEY))||{}

const months=[
"Tháng 1","Tháng 2","Tháng 3","Tháng 4",
"Tháng 5","Tháng 6","Tháng 7","Tháng 8",
"Tháng 9","Tháng 10","Tháng 11","Tháng 12"
]

const week=["T2","T3","T4","T5","T6","T7","CN"]

const holidays={
"01-01":"Tết Dương",
"04-30":"30/4",
"05-01":"Quốc tế lao động",
"09-02":"Quốc khánh",
"12-25":"Giáng sinh"
}

function save(){
localStorage.setItem(KEY,JSON.stringify(data))
}

function daysInMonth(m){
return new Date(year,m+1,0).getDate()
}

function startDay(m){
let d=new Date(year,m,1).getDay()
return d===0?6:d-1
}

function activateMonth(el,m){

if(el.classList.contains("active")){
calendar.classList.remove("active")
el.classList.remove("active")
activeMonth=null
return
}

calendar.classList.add("active")
document.querySelectorAll(".month").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
activeMonth=m
}

function toggleDay(m,d){

let date=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

let note=prompt("Ghi chú:",data[date]?.note||"")

if(note){
data[date]={note:note}
}else{
delete data[date]
}

save()
build()

calendar.classList.remove("active")
}

function resetMonth(){

if(activeMonth===null)return alert("Chưa chọn tháng")

if(confirm("Xoá dữ liệu tháng này?")){

Object.keys(data).forEach(k=>{
if(k.startsWith(year+"-"+String(activeMonth+1).padStart(2,'0'))){
delete data[k]
}
})

save()
build()
}

}

function resetAll(){

if(confirm("Xoá toàn bộ lịch?")){
data={}
save()
build()
}

}

function exportJSON(){

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="calendar-data.json"

a.click()

}

document.getElementById("importFile").onchange=e=>{

const file=e.target.files[0]
const reader=new FileReader()

reader.onload=function(){
data=JSON.parse(reader.result)
save()
build()
}

reader.readAsText(file)
}

function build(){

calendar.innerHTML=""
let done=0

months.forEach((name,m)=>{

const month=document.createElement("div")
month.className="month"
month.onclick=()=>activateMonth(month,m)

month.innerHTML=`<div class="month-title">${name}</div>
<div class="week">${week.map(w=>`<div>${w}</div>`).join("")}</div>`

const days=document.createElement("div")
days.className="days"

let offset=startDay(m)
let total=daysInMonth(m)

for(let i=0;i<42;i++){

const cell=document.createElement("div")

if(i<offset||i>=offset+total){

cell.className="day empty"

}else{

let d=i-offset+1
let date=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

cell.className="day"
cell.textContent=d

if(date===todayStr)cell.classList.add("today")

let md=`${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

if(holidays[md]){
cell.classList.add("holiday")
cell.title=holidays[md]
}

if(data[date]){
cell.classList.add("done")
done++
cell.title=data[date].note
}

cell.onclick=e=>{
e.stopPropagation()
toggleDay(m,d)
}

}

days.appendChild(cell)

}

month.appendChild(days)
calendar.appendChild(month)

})

document.getElementById("doneCount").textContent=done
}

build()

</script>

</body>
</html>
